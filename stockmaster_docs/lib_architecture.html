<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster - Architecture Map</title>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="css/lib_architecture.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <div>
                <h1>StockMaster <span class="badge">MVVM</span></h1>
                <p>Architecture Explorer</p>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="dot cat-models"></span>Models (Data)</div>
            <div class="legend-item"><span class="dot cat-views"></span>Views (UI)</div>
            <div class="legend-item"><span class="dot cat-viewmodels"></span>ViewModels (Logic)</div>
            <div class="legend-item"><span class="dot cat-services"></span>Services</div>
            <div class="legend-item"><span class="dot cat-utils"></span>Utils</div>
        </div>
    </header>

    <div id="chart"></div>
    
    <!-- Tooltip Custom -->
    <div id="tooltip" class="tooltip"></div>

    <div class="controls-hint">
        <i class="fas fa-mouse"></i> Scroll pour Zoomer • Drag pour Pan • Click pour Ouvrir/Fermer
    </div>

    <script src="js/lib_architecture.js"></script>
</body>
</html>
